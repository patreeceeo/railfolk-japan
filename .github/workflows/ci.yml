name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DJANGO_DEBUG: "true"
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - name: Check Django project
        run: nix develop --command python manage.py check
      - name: Run tests
        run: nix develop --command python manage.py test

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST || vars.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER || vars.DEPLOY_USER }}
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_SSH_KEY"
          test -n "$DEPLOY_USER"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
      - name: Deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST || vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER || vars.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" 'bash -s' <<'REMOTE_SCRIPT'
          set -euo pipefail

          app_dir="/var/lib/railfolk-japan/app"
          repo_url="https://github.com/patreeceeo/railfolk-japan.git"
          env_file="/etc/railfolk-japan/env"
          service_user="railfolk-japan"
          service_group="railfolk-japan"

          if ! getent group "$service_group" >/dev/null 2>&1; then
            sudo groupadd --system "$service_group"
          fi

          if ! id -u "$service_user" >/dev/null 2>&1; then
            sudo useradd \
              --system \
              --gid "$service_group" \
              --home-dir /var/lib/railfolk-japan \
              "$service_user"
          fi

          sudo install -d -m 0755 -o "$service_user" -g "$service_group" /var/lib/railfolk-japan
          sudo install -d -m 0755 -o "$service_user" -g "$service_group" "$app_dir"
          sudo install -d -m 0755 -o root -g root /etc/railfolk-japan

          old_user_service="$HOME/.config/systemd/user/railfolk-japan.service"
          if [ -f "$old_user_service" ]; then
            systemctl --user disable --now railfolk-japan.service >/dev/null 2>&1 || true
            rm -f "$old_user_service"
            systemctl --user daemon-reload >/dev/null 2>&1 || true
          fi

          if [ ! -d "$app_dir/.git" ]; then
            sudo -u "$service_user" git clone "$repo_url" "$app_dir"
          fi

          sudo -u "$service_user" git -C "$app_dir" fetch origin main
          sudo -u "$service_user" git -C "$app_dir" reset --hard origin/main

          if [ ! -f "$env_file" ]; then
            umask 077
            secret_key="$(sudo -u "$service_user" bash -lc "cd '$app_dir' && nix develop --command python -c 'import secrets; print(secrets.token_urlsafe(50))'")"
            env_tmp="$(mktemp)"
            {
              printf 'DJANGO_SECRET_KEY=%s\n' "$secret_key"
              printf 'DJANGO_ALLOWED_HOSTS=railfolk.zzt64.com,localhost,127.0.0.1\n'
              printf 'DJANGO_DATABASE_PATH=/var/lib/railfolk-japan/db.sqlite3\n'
            } > "$env_tmp"
            sudo install -m 0640 -o root -g "$service_group" "$env_tmp" "$env_file"
            rm -f "$env_tmp"
          fi
          sudo chown root:"$service_group" "$env_file"
          sudo chmod 0640 "$env_file"

          sudo -u "$service_user" bash -lc "cd '$app_dir' && set -a && . '$env_file' && set +a && nix develop --command python manage.py migrate --noinput"
          sudo -u "$service_user" bash -lc "cd '$app_dir' && set -a && . '$env_file' && set +a && nix develop --command python manage.py collectstatic --noinput"

          installer="$(sudo -u "$service_user" bash -lc "cd '$app_dir' && nix build .#railfolkJapanInstallService --print-out-paths")"
          sudo "$installer/bin/railfolk-japan-install-service"

          sudo systemctl status railfolk-japan.service --no-pager
          REMOTE_SCRIPT
