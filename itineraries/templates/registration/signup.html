<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Sign up</title>
</head>
<body>
    <h1>Sign up</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Sign up</button>
    </form>

    <p><a href="{% url 'login' %}">Sign in</a></p>
</body>
</html>
